<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">realraelrr profile banner</title>
  <desc id="desc">A dark technical banner for agentic tools and runtime automation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09090B"/>
      <stop offset="0.54" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 100) rotate(140) scale(420 260)">
      <stop stop-color="#60A5FA" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="34" fill="url(#grid)"/>
  <rect width="1280" height="360" rx="34" fill="url(#glow)"/>

  <g opacity="0.72" filter="url(#softShadow)">
    <path d="M880 92H1100C1132 92 1158 118 1158 150V266" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
    <path d="M822 154H1002C1034 154 1060 180 1060 212V290" stroke="#BFDBFE" stroke-opacity="0.62" stroke-width="2" stroke-linecap="round"/>
    <circle cx="880" cy="92" r="8" fill="#60A5FA"/>
    <circle cx="822" cy="154" r="8" fill="#DBEAFE"/>
    <circle cx="1158" cy="266" r="8" fill="#2563EB"/>
    <circle cx="1060" cy="290" r="8" fill="#93C5FD"/>
  </g>

  <g transform="translate(76 76)">
    <rect x="0" y="0" width="198" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="18" y="23" fill="#BFDBFE" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="600">AGENTIC TOOLING</text>

    <text x="0" y="112" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="74" font-weight="800" letter-spacing="-3">realraelrr</text>
    <text x="2" y="164" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="500">Building AI workflows with Hermes agent + Codex.</text>

    <g transform="translate(0 212)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16" font-weight="600">
      <rect x="0" y="0" width="174" height="42" rx="21" fill="#2563EB" fill-opacity="0.95"/>
      <text x="24" y="27" fill="#FFFFFF">Python</text>
      <rect x="190" y="0" width="190" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="214" y="27" fill="#DBEAFE">JavaScript</text>
      <rect x="396" y="0" width="142" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="420" y="27" fill="#DBEAFE">Bash</text>
      <rect x="554" y="0" width="176" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <text x="578" y="27" fill="#DBEAFE">macOS</text>
    </g>
  </g>
